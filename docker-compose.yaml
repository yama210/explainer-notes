services:
  db:
    image: postgres:16-alpine
    container_name: explainer-notes-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: explainer_notes
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d explainer_notes"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: explainer-notes-app
    env_file:
      - .env.docker
    ports:
      - "3000:3000"
    environment:
      CI: "true"
      NEXT_TELEMETRY_DISABLED: "1"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "tr -d '\\r' < ./scripts/docker-dev-entrypoint.sh > /tmp/docker-dev-entrypoint.sh && chmod +x /tmp/docker-dev-entrypoint.sh && /tmp/docker-dev-entrypoint.sh",
      ]

volumes:
  db_data:
  node_modules:
